<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Button Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loader" class="loader-wrapper">
        <div class="loader-content">
            <div class="coin-spinner"></div>
            <h2 class="loading-text">CONNECTING TO NODE...</h2>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="top-nav">
            <div class="online-status">
                <span class="dot"></span>
                <span id="online-count">0</span> ONLINE
            </div>
            <div id="ton-connect-btn"></div>
        </header>

        <main class="game-screen">
            <section class="coin-selector" id="coin-selector">
                <h3>CHOOSE YOUR TARGET</h3>
                <div class="coin-grid">
                    <div class="coin-item active" onclick="selectCoin(0)">BTC</div>
                    <div class="coin-item" onclick="selectCoin(1)">ETH</div>
                    <div class="coin-item" onclick="selectCoin(2)">SOL</div>
                    <div class="coin-item" onclick="selectCoin(3)">TON</div>
                    <div class="coin-item" onclick="selectCoin(4)">PEPE</div>
                </div>
            </section>

            <div class="prize-display">
                <p class="label">CURRENT JACKPOT</p>
                <h1 id="prize-text">0.01 <span class="yellow">BTC</span></h1>
            </div>

            <div class="timer-container">
                <div class="timer-digits font-mono" id="main-timer">60:00</div>
            </div>

            <div class="button-zone">
                <button id="tap-btn" class="crypto-button shadow-btc">
                    <div id="coin-icon-svg">
                        </div>
                </button>
                <div class="energy-badge">ENERGY: <span id="energy-val">5</span>/5</div>
            </div>
        </main>

        <footer class="bottom-panel">
            <button class="action-btn buy-btn" onclick="openShop()">GET MORE ATTEMPTS</button>
            <button class="action-btn invite-btn" onclick="invite()">INVITE FRIENDS</button>
            <div class="leaderboard-mini" id="leaders">
                </div>
        </footer>
    </div>

    <div id="shop-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2>REFILL ENERGY</h2>
            <div class="shop-item"><span>10 ATTEMPTS</span> <button>2 TON</button></div>
            <div class="shop-item"><span>35 ATTEMPTS</span> <button>6.19 TON</button></div>
            <button class="close-btn" onclick="closeShop()">CLOSE</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
