<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Button Ultimate</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader" class="loader-wrapper">
        <div class="loader-content">
            <div class="coin-spinner"></div>
            <h2 class="loading-text">SYNCING NODES...</h2>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="top-nav">
            <div class="online-status">
                <span class="dot"></span>
                <span id="online-count">4,201</span>
            </div>
            
            <div class="nav-center">
                <button class="nav-icon-btn shop-glow" onclick="openShop()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </button>
            </div>

            <button class="profile-trigger" onclick="window.location.href='account.html'">
                <div class="user-avatar-mini" id="nav-avatar"></div>
            </button>
        </header>

        <main class="game-screen">
            <section class="coin-selector">
                <div class="coin-grid">
                    <div class="coin-item active" onclick="selectCoin(0)">BTC</div>
                    <div class="coin-item" onclick="selectCoin(1)">ETH</div>
                    <div class="coin-item" onclick="selectCoin(2)">SOL</div>
                    <div class="coin-item" onclick="selectCoin(3)">TON</div>
                    <div class="coin-item finish-tag" onclick="selectCoin(4)">PEPE</div>
                    <div class="coin-item list-new-btn" onclick="window.location.href='create.html'">+ LIST</div>
                </div>
            </section>

            <div class="prize-display">
                <p class="label">CURRENT JACKPOT</p>
                <h1 id="prize-text">0.01 <span class="yellow">BTC</span></h1>
            </div>

            <div class="timer-container">
                <div class="timer-digits" id="main-timer">60:00</div>
            </div>

            <div class="button-zone">
                <button id="tap-btn" class="crypto-button shadow-btc">
                    <div id="coin-icon-svg" class="full-svg"></div>
                </button>
                <div class="energy-badge">ENERGY: <span id="energy-val">10</span>/10</div>
            </div>
        </main>

        <footer class="bottom-panel">
            <button class="action-btn invite-btn" onclick="invite()">
                <span>INVITE FRIENDS</span>
                <small>GET +5 FREE TRIES</small>
            </button>
            
            <div class="leader-section">
                <div class="leader-title">TOP RECENT WINNERS</div>
                <div id="leaders" class="leaders-list">
                    </div>
            </div>
        </footer>
    </div>

    <div id="shop-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="shop-header">
                <h2 class="yellow">REFILL ENERGY</h2>
                <p>Attempts are credited instantly after payment</p>
            </div>
            
            <div class="shop-grid">
                <div class="pack-card hot">
                    <div class="badge">POPULAR</div>
                    <span class="pack-title">PLAYER</span>
                    <b class="pack-amount">15 TRIES</b>
                    <button class="buy-btn-stars" onclick="buy(15, 'stars')">★ 150</button>
                    <button class="buy-btn-ton" onclick="buy(15, 'ton')">0.3 TON</button>
                </div>
                <div class="pack-card">
                    <span class="pack-title">WHALE</span>
                    <b class="pack-amount">100 TRIES</b>
                    <button class="buy-btn-stars" onclick="buy(100, 'stars')">★ 800</button>
                    <button class="buy-btn-ton" onclick="buy(100, 'ton')">1.5 TON</button>
                </div>
            </div>
            <button class="close-btn" onclick="closeShop()">RETURN TO GAME</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
