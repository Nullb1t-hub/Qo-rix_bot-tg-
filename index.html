<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Button Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader" class="loader-wrapper">
        <div class="loader-content">
            <div class="coin-spinner"></div>
            <h2 class="loading-text font-mono">LOADING SYSTEM...</h2>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </div>

    <div id="onboarding" class="onboarding-overlay hidden">
        <div class="onboarding-card">
            <span class="step-img">⚡</span>
            <h2 class="text-xl font-black mb-2 italic">WELCOME TO THE RACE</h2>
            <p class="text-gray-400 text-sm mb-6">Press the button. If you are the last one when the timer hits 00:00, you win the jackpot!</p>
            <button onclick="closeOnboarding()" class="start-btn">START PLAYING</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="top-nav">
            <div class="online-status">
                <span class="dot"></span>
                <span id="online-count">0</span> ONLINE
            </div>
            
            <button class="shop-top-btn" onclick="openShop()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                <span>SHOP</span>
            </button>

            <button class="profile-trigger" onclick="window.location.href='account.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </button>
        </header>

        <main class="game-screen">
            <div class="coin-selector">
                <div class="coin-grid">
                    <div class="coin-item active" onclick="selectCoin(0)">BTC</div>
                    <div class="coin-item" onclick="selectCoin(1)">ETH</div>
                    <div class="coin-item" onclick="selectCoin(2)">SOL</div>
                    <div class="coin-item" onclick="selectCoin(3)">TON</div>
                    <div class="coin-item finish-tag" onclick="selectCoin(4)">PEPE</div>
                </div>
            </div>

            <div class="prize-display">
                <p class="label">JACKPOT POOL</p>
                <h1 id="prize-text">0.01 <span class="yellow">BTC</span></h1>
            </div>

            <div class="timer-container">
                <div class="timer-digits" id="main-timer">60:00</div>
            </div>

            <div class="button-zone">
                <div id="btn-container">
                    <button id="tap-btn" class="crypto-button shadow-btc">
                        <div id="coin-icon-svg" class="full-svg"></div>
                    </button>
                </div>
                <div class="energy-badge">ENERGY: <span id="energy-val">5</span>/5</div>
            </div>
        </main>

        <footer class="bottom-panel">
            <button class="action-btn invite-btn" onclick="invite()">INVITE & GET +5 TRIES</button>
            <div class="leaderboard-mini">
                <div class="leader-title">LAST TAP RECORDERS</div>
                <div id="leaders" class="space-y-1"></div>
            </div>
        </footer>
    </div>

    <div id="shop-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2 class="yellow italic font-black text-xl mb-4">ENERGY SHOP</h2>
            <div class="shop-grid">
                <div class="pack-card">
                    <span class="pack-title">PLAYER PACK</span>
                    <b class="pack-amount">+10 TRIES</b>
                    <button class="buy-btn-ton" onclick="buy(10, 'ton')">2.0 TON</button>
                    <button class="buy-btn-stars" onclick="buy(10, 'stars')">★ 500</button>
                </div>
                <div class="pack-card">
                    <span class="pack-title">WHALE PACK</span>
                    <b class="pack-amount">+50 TRIES</b>
                    <button class="buy-btn-ton" onclick="buy(50, 'ton')">9.5 TON</button>
                    <button class="buy-btn-stars" onclick="buy(50, 'stars')">★ 2500</button>
                </div>
            </div>
            <button class="close-btn" onclick="closeShop()">CLOSE</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
